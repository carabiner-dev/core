syntax = "proto3";
package carabiner.core.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

option go_package = "github.com/carabiner-dev/core/api/carabiner/core/v1;core";

// Status represents the lifecycle state of a resource. STATUS_UNSPECIFIED is
// treated as STATUS_ACTIVE for backward compatibility with records written
// before the field existed.
enum Status {
	STATUS_UNSPECIFIED = 0;
	STATUS_ACTIVE = 1;
	STATUS_SUSPENDED = 2;
}

// PipelineState is the lifecycle state of a pipeline (workflow) in its source
// system. Pipelines are soft-deleted (marked PIPELINE_STATE_DELETED) rather
// than removed so historical runs that reference them remain viewable.
enum PipelineState {
	// Unspecified; treated as active for records written before the field existed.
	PIPELINE_STATE_UNSPECIFIED = 0;
	// The pipeline currently exists and is enabled in the source system.
	PIPELINE_STATE_ACTIVE = 1;
	// The pipeline exists but is disabled in the source system (e.g. a GitHub
	// workflow disabled manually or for inactivity).
	PIPELINE_STATE_DISABLED = 2;
	// The pipeline no longer exists in the source system; kept for historical
	// runs (soft delete).
	PIPELINE_STATE_DELETED = 3;
}

// A system abstracts a system capable of handling one or more stages
// of the SDLC. A CI/CD system, for example, can handle builds
message System {
	string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];
	string organization = 2;
	string name = 3;
	string type = 4 [
		(buf.validate.field).string = {in: ["github", "gitlab"]}
	];
}

// Namespace abstracts a namespace inside of a system
message Namespace {
	string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];
	System system = 2;
	string name = 3 [
        (buf.validate.field).string = {
            pattern: "^[-_a-zA-Z0-9]+$",
            max_len: 200,
        }
    ];
	// Lifecycle status. Set to STATUS_SUSPENDED when the backing GitHub App
	// installation is suspended. Unspecified is treated as active.
	Status status = 4;
}

// Repository abstracts a source-code repository tracked under a namespace. The
// descriptive fields below are populated from the source system when the
// repository is connected (registered). They are system-agnostic so any system
// (GitHub, GitLab, …) maps onto them.
message Repository  {
    string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];
	string name = 2 [
        (buf.validate.field).string = {
            pattern: "^[-_a-zA-Z0-9]+$",
            max_len: 200,
        }
    ];
	Namespace namespace = 3;

	// external_id is the repository's stable identifier in its source system
	// (e.g. a GitHub numeric repository ID). It is immutable across renames and
	// is the idempotency/lookup key for a connected repository.
	string external_id = 4;

	// slug is the repository's human-readable path within its system, e.g.
	// "owner/repo". It is mutable: a rename changes the slug but not external_id.
	string slug = 5;

	// url is the repository's web URL.
	string url = 6;

	// visibility is the repository's visibility in its system, e.g. "public",
	// "private", or "internal".
	string visibility = 7;

	// default_branch is the repository's default branch, e.g. "main".
	string default_branch = 8;

	// description is the repository's short description.
	string description = 9;
}

// Pipeline abstracts an automated workflow declared in a repository (e.g. a
// GitHub Actions workflow or a GitLab CI pipeline). It is a declared object:
// it exists as long as its definition lives in the repository, independent of
// any run. A pipeline contains jobs, which contain steps.
message Pipeline  {
	// Carabiner-assigned unique identifier.
    string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];

	// Human-readable display name as reported by the source system, e.g.
	// "CI / Build". Free-form (may contain spaces and punctuation).
	string name = 2 [
        (buf.validate.field).string = {max_len: 255}
    ];

	// The repository this pipeline is declared in.
	Repository repository = 3;

	// external_id is the pipeline's stable identifier in its source system
	// (e.g. a GitHub numeric workflow ID). It is the idempotency/lookup key for
	// reconciling the repository's pipelines.
	string external_id = 4;

	// path is the pipeline definition's location within the repository, e.g.
	// ".github/workflows/release.yml".
	string path = 5;

	// state is the pipeline's lifecycle state in the source system. Removed
	// pipelines are marked PIPELINE_STATE_DELETED rather than dropped.
	PipelineState state = 6;

	// monitored reports whether the platform actively monitors this pipeline.
	// Monitoring is opt-in: it is off until explicitly enabled, and consumers
	// default to listing only monitored pipelines.
	bool monitored = 7;
}

// Task abstracts a unit of execution within a pipeline that groups steps (a
// GitHub Actions job, a GitLab CI job, a Tekton task). It is the intermediate
// level between a pipeline and its steps. Systems without a task concept may
// model a single synthetic task; systems with stages (e.g. GitLab) may record
// the stage name in `stage`.
message Task {
	// Carabiner-assigned unique identifier.
	string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];

	// Human-readable display name as reported by the source system. Free-form.
	string name = 2 [
        (buf.validate.field).string = {max_len: 255}
    ];

	// The pipeline this task belongs to.
	Pipeline pipeline = 3;

	// external_id is the task's stable identifier in its source system. For a
	// declared GitHub job this is its key in the workflow file (e.g. "build").
	string external_id = 4;

	// stage is an optional grouping the source system places this task in (e.g. a
	// GitLab stage). Empty for systems without stages.
	string stage = 5;
}

// Step is a single operation within a task (e.g. a GitHub Actions step).
message Step {
	// Carabiner-assigned unique identifier.
	string ID = 1 [
		(buf.validate.field).string = {uuid: true}
	];

	// Human-readable display name as reported by the source system. Free-form.
	string name = 2 [
        (buf.validate.field).string = {max_len: 255}
    ];

	// The task this step belongs to.
	Task task = 3;

	// external_id is the step's stable identifier in its source system, when one
	// exists.
	string external_id = 4;

	// number is the step's 1-based position within its task, used to order steps.
	uint32 number = 5;
}
